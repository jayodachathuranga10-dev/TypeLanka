name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build App Payload
      run: |
        xcodebuild build \
          -project TypeLanka.xcodeproj \
          -scheme TypeLankaApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos"

    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -R build/Release-iphoneos/TypeLankaApp.app Payload/
        zip -r TypeLankaKeyboard.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TypeLanka-Keyboard-App
        path: TypeLankaKeyboard.ipa
