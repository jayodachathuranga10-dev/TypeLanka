name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install xcodegen
        brew install ldid

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Create No-Sign Configuration
      run: |
        echo "CODE_SIGNING_ALLOWED = NO" > no-sign.xcconfig
        echo "CODE_SIGNING_REQUIRED = NO" >> no-sign.xcconfig
        echo "CODE_SIGN_IDENTITY = " >> no-sign.xcconfig
        echo "ENABLE_BITCODE = NO" >> no-sign.xcconfig

    - name: Build for Phone (iphoneos)
      run: |
        xcodebuild build \
          -project Flashboard.xcodeproj \
          -scheme FlashboardApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -xcconfig no-sign.xcconfig \
          -sdk iphoneos \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/iphoneos"
 
    - name: Build for Simulator (iphonesimulator)
      run: |
        xcodebuild build \
          -project Flashboard.xcodeproj \
          -scheme FlashboardApp \
          -configuration Release \
          -destination 'generic/platform=iOS Simulator' \
          -xcconfig no-sign.xcconfig \
          -sdk iphonesimulator \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/simulator"

    - name: Ad-Hoc Sign binaries
      run: |
        # Phone binaries
        ldid -S "build/iphoneos/FlashboardApp.app/PlugIns/FlashboardKeyboard.appex/FlashboardKeyboard"
        ldid -S "build/iphoneos/FlashboardApp.app/PlugIns/FlashboardKeyboard.appex"
        ldid -S "build/iphoneos/FlashboardApp.app/FlashboardApp"
        ldid -S "build/iphoneos/FlashboardApp.app"

    - name: Package Phone IPA
      run: |
        mkdir -p Payload
        cp -R "build/iphoneos/FlashboardApp.app" Payload/
        zip -r Flashboard.ipa Payload

    - name: Package Simulator ZIP
      run: |
        cd build/simulator
        zip -r ../../Flashboard-Simulator.zip FlashboardApp.app

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Flashboard-Builds
        path: |
          Flashboard.ipa
          Flashboard-Simulator.zip
