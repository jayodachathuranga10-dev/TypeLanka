name: Flashboard
options:
  {} # Stability Reset v7.0
targets:
  FlashboardApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: FlashboardApp
    bundleId: com.flash.lanka.v7
    dependencies:
      - target: FlashboardKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flash.lanka.v7
    info:
      path: FlashboardApp/Info.plist
      properties:
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

  FlashboardKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources: FlashboardKeyboard
    bundleId: com.flash.lanka.v7.keyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flash.lanka.v7.keyboard
        ENABLE_BITCODE: NO
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    info:
      path: FlashboardKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Flashboard
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "KeyboardViewController"
