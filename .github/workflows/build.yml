name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Debug files (Just in case)
      run: ls -la

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project TypeLanka.xcodeproj \
          -scheme TypeLankaApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath TypeLankaApp.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Export Unsigned IPA Payload
      run: |
        mkdir -p Payload
        cp -R TypeLankaApp.xcarchive/Products/Applications/TypeLankaApp.app Payload/
        zip -r TypeLankaKeyboard.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TypeLanka-Keyboard-App
        path: TypeLankaKeyboard.ipa
