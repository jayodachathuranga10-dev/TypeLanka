name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install xcodegen
        brew install ldid

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Create No-Sign Configuration
      run: |
        echo "CODE_SIGNING_ALLOWED = NO" > no-sign.xcconfig
        echo "CODE_SIGNING_REQUIRED = NO" >> no-sign.xcconfig
        echo "CODE_SIGN_IDENTITY = " >> no-sign.xcconfig
        echo "ENABLE_BITCODE = NO" >> no-sign.xcconfig

    - name: Build App and Extension
      run: |
        xcodebuild build \
          -project Flashboard.xcodeproj \
          -scheme FlashboardApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -xcconfig no-sign.xcconfig \
          -sdk iphoneos \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos" \
          2>&1 | tee build_log.txt
        exit ${PIPESTATUS[0]}

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build_log.txt

    - name: Ad-Hoc Sign with ldid
      run: |
        echo "Fakesigning the extension binary..."
        ldid -S "build/Release-iphoneos/FlashboardApp.app/PlugIns/FlashboardKeyboard.appex/FlashboardKeyboard"
        
        echo "Fakesigning the appex bundle..."
        ldid -S "build/Release-iphoneos/FlashboardApp.app/PlugIns/FlashboardKeyboard.appex"
        
        echo "Fakesigning the main app..."
        ldid -S "build/Release-iphoneos/FlashboardApp.app"

    - name: Create IPA Payload
      run: |
        mkdir -p Payload
        cp -R "build/Release-iphoneos/FlashboardApp.app" Payload/
        zip -r Flashboard.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flashboard-Keyboard-App
        path: Flashboard.ipa
