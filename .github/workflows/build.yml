name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Create No-Sign Configuration
      run: |
        echo "CODE_SIGNING_ALLOWED = NO" > no-sign.xcconfig
        echo "CODE_SIGNING_REQUIRED = NO" >> no-sign.xcconfig
        echo "CODE_SIGN_IDENTITY = " >> no-sign.xcconfig
        echo "BITCODE_GENERATION_MODE = bitcode" >> no-sign.xcconfig

    - name: Build App and Extension
      run: |
        xcodebuild build \
          -project Flashboard.xcodeproj \
          -scheme FlashboardApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -xcconfig no-sign.xcconfig \
          -sdk iphoneos \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos"

    - name: Create IPA Payload (Plus PlugIns Fix)
      run: |
        mkdir -p Payload/FlashboardApp.app/PlugIns
        cp -R build/Release-iphoneos/FlashboardApp.app/ Payload/FlashboardApp.app/
        cp -R build/Release-iphoneos/FlashboardKeyboard.appex/ Payload/FlashboardApp.app/PlugIns/
        zip -r FlashboardKeyboard.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flashboard-Keyboard-App
        path: FlashboardKeyboard.ipa
