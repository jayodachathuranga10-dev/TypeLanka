name: Flashboard
options:
  bundleIdPrefix: com.example
targets:
  FlashboardApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: FlashboardApp
    bundleId: com.example.FlashboardApp
    dependencies:
      - target: FlashboardKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FlashboardApp
    info:
      path: FlashboardApp/Info.plist
      properties:
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

  FlashboardKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources: FlashboardKeyboard
    bundleId: com.example.FlashboardApp.FlashboardKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FlashboardApp.FlashboardKeyboard
    info:
      path: FlashboardKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Flashboard
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
