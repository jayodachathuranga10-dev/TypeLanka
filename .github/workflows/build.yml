name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Create No-Sign Configuration
      run: |
        echo "CODE_SIGNING_ALLOWED = NO" > no-sign.xcconfig
        echo "CODE_SIGNING_REQUIRED = NO" >> no-sign.xcconfig
        echo "CODE_SIGN_IDENTITY = " >> no-sign.xcconfig
        echo "BITCODE_GENERATION_MODE = bitcode" >> no-sign.xcconfig

    - name: Build App and Extension
      run: |
        xcodebuild build \
          -project TypeLanka.xcodeproj \
          -scheme TypeLankaApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -xcconfig no-sign.xcconfig \
          -sdk iphoneos \
          CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos"

    - name: Create IPA Payload (Plus PlugIns Fix)
      run: |
        # 1. Create the standard iOS App folder structure
        mkdir -p Payload/TypeLankaApp.app/PlugIns
        
        # 2. Copy the main App into Payload
        cp -R build/Release-iphoneos/TypeLankaApp.app/ Payload/TypeLankaApp.app/
        
        # 3. Copy the Keyboard Extension into the secret PlugIns folder
        cp -R build/Release-iphoneos/TypeLankaKeyboard.appex/ Payload/TypeLankaApp.app/PlugIns/
        
        # 4. Zip it all up into an IPA
        zip -r TypeLankaKeyboard.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TypeLanka-Keyboard-App
        path: TypeLankaKeyboard.ipa
