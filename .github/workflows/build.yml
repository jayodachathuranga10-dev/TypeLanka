name: Build Flashboard v7.1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Dual Build (Phone & Simulator)
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Create Signing Config
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" > no-sign.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> no-sign.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> no-sign.xcconfig

      - name: Build for Physical Device (IPA)
        run: |
          xcodebuild build \
            -project Flashboard.xcodeproj \
            -scheme FlashboardApp \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -xcconfig no-sign.xcconfig \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build/Debug-iphoneos
          
          mkdir -p Payload
          cp -r build/Debug-iphoneos/FlashboardApp.app Payload/
          zip -r Flashboard.ipa Payload

      - name: Build for Online Simulator (ZIP)
        run: |
          xcodebuild build \
            -project Flashboard.xcodeproj \
            -scheme FlashboardApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -xcconfig no-sign.xcconfig \
            -sdk iphonesimulator \
            CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build/Debug-iphonesimulator
          
          cd build/Debug-iphonesimulator
          zip -r ../../Flashboard-Simulator.zip FlashboardApp.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Flashboard-Build-v7-1
          path: |
            Flashboard.ipa
            Flashboard-Simulator.zip
